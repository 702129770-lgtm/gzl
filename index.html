<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="面向真实用户的 PPT 制作服务预览版，支持资料上传、风格选择、样稿确认、成稿预览与导出。"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPT 制作助手</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23533afd'/%3E%3Cpath d='M17 18h30v6H17zm0 11h20v6H17zm0 11h26v6H17z' fill='white'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="#top" aria-label="PPT 制作助手">
          <span class="brand-mark">P</span>
          <span>
            <strong>PPT 制作助手</strong>
            <small>从资料到成稿导出</small>
          </span>
        </a>

        <div class="header-progress" aria-label="当前进度">
          <span id="header-step">第 1 步</span>
          <strong id="header-title">服务介绍</strong>
        </div>
      </header>

      <main class="app-main" id="top">
        <section class="work-card" aria-label="当前页面">
          <div class="step-copy">
            <p class="eyebrow" id="step-eyebrow">PPT service</p>
            <h1 id="screen-title">把资料交给我们，先看样稿，再确认全套 PPT。</h1>
            <p id="screen-copy">
              上传资料后，我们会根据内容匹配合适的视觉方向。你只需要确认风格、样稿和成稿，最后下载 PPTX 或 PDF。
            </p>
          </div>

          <div class="screen-area" id="screen-area"></div>

          <div class="action-bar">
            <button class="button secondary" type="button" id="secondary-action">返回</button>
            <button class="button secondary" type="button" id="tertiary-action">修改样稿</button>
            <button class="button primary" type="button" id="primary-action">开始制作</button>
          </div>

          <p class="toast" id="toast" role="status" aria-live="polite" hidden></p>
        </section>
      </main>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
